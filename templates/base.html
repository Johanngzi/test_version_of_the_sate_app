{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Django App{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

{% if not hide_navbar %}
<header style="background: #4a2e1f; padding: 10px 20px;">
    <nav style="display: flex; align-items: center; gap: 20px;">
        
        <!-- Logo on the left -->
        <a href="{% url 'home' %}">
            <img src="{% static 'images/logo.png' %}" alt="Sate App Logo" style="height: 50px;">
        </a>

        <!-- User name or Home link -->
        <a href="{% url 'home' %}" style="color: white; text-decoration: none; font-size: 24px;">
            Naam gebruiker
        </a>

    </nav>
</header>
{% endif %}

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/script.js' %}"></script>
</body>
</html>
