{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Django App{% endblock %}</title>

    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Your custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <!-- Navbar -->
   <!-- <nav class="navbar navbar-expand-lg navbar-dark mb-4" 
     style="background-color: rgb(94, 66, 66); padding: 10px;">
    <div class="container-fluid">
        <a class="navbar-brand" href="#" style="color: #FFF5E1; font-weight: bold;">Sate App</a>
    </div>
   </nav> -->
   <nav class="navbar navbar-expand-lg navbar-dark mb-4" 
     style="background-color: #6F4E37; padding: 0.5rem 1rem;">
  <div class="container-fluid">
    <!-- Brand / App Name -->
    <a class="navbar-brand" href="#" 
       style="color: #FFF5E1; font-weight: bold;">Sate App</a>

    <!-- Toggle button for mobile -->
    <button class="navbar-toggler" type="button" 
            data-bs-toggle="collapse" data-bs-target="#navbarContent" 
            aria-controls="navbarContent" aria-expanded="false" 
            aria-label="Toggle navigation" 
            style="border-color: #FFF5E1;">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Collapsible content -->
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#" 
             style="color: #FFF5E1;">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" style="color: #FFF5E1;">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#" style="color: #FFF5E1;">Login</a>
        </li>
      </ul>
     </div>
     </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
