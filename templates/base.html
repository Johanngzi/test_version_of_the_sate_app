{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Django App{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href= "{% static 'css/app.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>


<body class="d-flex flex-column min-vh-100">
    
    {% if not hide_navbar %}
    <header style="background: #4a2e1f; padding-left: 20px;">
        <nav style="display: flex; align-items: center; gap: 20px; height: 80px;">
            
            <!-- Logo on the left -->
            <a href="{% url 'home' %}">
                <img src="{% static 'images/logo_light.png' %}" alt="Sate App Logo" style="height: 50px;">
            </a>
            
            <!-- User name or Home link -->
            <a href="{% url 'home' %}" style="color: white; text-decoration: none; font-size: 24px;">
                Naam gebruiker
            </a>
            
        </nav>
    </header>
    {% endif %}
    
     <!-- Main content takes all remaining space -->
    <main class="container mt-3 flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    {% if not hide_footer %}
    <footer class="footer mt-auto text-white">
      <div class="container d-flex justify-content-evenly align-items-center">
        
        <!-- all Links -->
        <div class="footer-links">
          <a href="{% url 'competitions' %}" class="text-white text-decoration-none me-3"><i class="fa-solid fa-clock-rotate-left"></i></a>
          <a href="{% url 'home' %}" class="text-white text-decoration-none me-3"><i class="fa-solid fa-house"></i></a>
          <!-- <a href="#" class="text-white text-decoration-none">Contact</a> -->
        </div>
    
      </div>
    
    </footer>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/script.js' %}"></script>
</body>

</html>
