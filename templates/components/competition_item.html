<div class="competition-item">
  <div class="competition-item__content">

    <div class="competition-item__text">
     <h2 class="home-subtitle {{ title_class }}">{{ title }}</h2>
      {% if subtitle %}
        <p class="competition-meta">{{ subtitle }}</p>
      {% endif %}
    </div>

    {% if button_label %}
    {% include "components/button.html" with label=button_label variant="primary" class="btn-app-competitions-users-page-tocompetition-size" only %}
    {% endif %}
  </div>
</div>
